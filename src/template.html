<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todoo- Tasks noted!</title>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo">ToDoo</div>
            <div class="button">
                <button id="addProject">Add Project</button>
                <dialog class="projectDialog">
                  <form >
                    <p>
                        <label for="name"> Name:
                            <input type="text">
                        </label>
                        <label for="description">ID:
                            <input type="number">
                        </label>
                    </p>
                    <div>
                        <button value="cancel" formmethod="dialog">Cancel</button>
                        <button id="confirmBtn" value="defualt">Confirm</button>
                    </div>
                  </form>
                </dialog>
            </div>
            <div class="projects">
                <div>Foo</div>
                <div>Bar</div>
                <div>Blah</div>
            </div>
        </div>
        <div class="main">
            <div class="heading">
                Tasks
            </div>
            <div class="button"><button id="addTask">Add Task</button></div>
            <div class="tasks">
                <div>Task1</div>
                <div>Task2</div>
                <div>Task3</div>
            </div>
        </div>
    </div>
</body>
</html>
